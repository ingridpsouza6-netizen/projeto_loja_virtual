<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <!-- Configurações da página -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Título da aba do navegador -->
    <title>Cadastro - Vista & Arte</title>

    <!-- Arquivo CSS -->
    <link rel="stylesheet" href="../css/style_cadastro.css">
<script src="../js/consulta_cep.js" defer></script>
</head>

<body>

    <!-- ================= CABEÇALHO ================= -->

    <header>

        <!-- Nome da loja -->
        <h1>Vista & Arte</h1>

        <!-- Menu de navegação -->
        <nav>

            <ul>

                <li><a href="../index.html">Início</a></li>

                <li><a href="./cadrastro.html">Cadastro</a></li>

                <li><a href="./sobrenos.html">Sobre Nós</a></li>

                <li><a href="login.html">Login</a></li>
                

                <!-- Link do carrinho -->
                <li>
                    <a href="carrinho.html">Carrinho</a>
                   
                </li>

            </ul>

        </nav>

    </header>


    <!-- ================= CONTEÚDO PRINCIPAL ================= -->

    <main>

        <!-- Título da página -->
        <h2>Cadastro de Cliente</h2>

        <!-- Formulário de cadastro -->
        <form>

            <!-- Nome e CPF -->
            <div class="grupo">

                <div>
                    <label>Nome Completo</label>
                    <input type="text" required>
                </div>

                <div>
                    <label>CPF</label>
                    <input type="text" required>
                </div>

            </div>


            <!-- E-mail e telefone -->
            <div class="grupo">

                <div>
                    <label>E-mail</label>
                    <input type="email" required>
                </div>

                <div>
                    <label>Telefone</label>
                    <input type="tel">
                </div>

            </div>


            <!-- Data de nascimento e CEP -->
            <div class="grupo">

                <div>
                    <label>Data de Nascimento</label>
                    <input type="date">
                </div>

                <div>
                    <label>CEP</label>
                    <input type="text">
                </div>

            </div>


            <!-- Endereço -->
            <label>Endereço</label>
            <input type="text">


            <!-- Número e complemento -->
            <div class="grupo">

                <div>
                    <label>Número</label>
                    <input type="number">
                </div>

                <div>
                    <label>Complemento</label>
                    <input type="text">
                </div>

            </div>


            <!-- Cidade e estado -->
            <div class="grupo">

                <div>
                    <label>Cidade</label>
                    <input type="text">
                </div>

                <div>
                    <label>Estado</label>
                    <input type="text">
                </div>

            </div>


            <!-- Senha -->
            <label>Senha</label>
            <input type="password">


            <!-- Confirmação da senha -->
            <label>Confirmar Senha</label>
            <input type="password">


            <!-- Termos de uso -->
            <div class="check">

                <input type="checkbox">

                <span>Aceito os termos de uso.</span>

            </div>


            <!-- Botão de cadastro -->
            <button type="submit">Cadastrar</button>

        </form>

    </main>


    <!-- ================= RODAPÉ ================= -->

    <footer>

        <p>&copy; 2026 Vista & Arte - Todos os direitos reservados.</p>

    </footer>

</body>

</html>
