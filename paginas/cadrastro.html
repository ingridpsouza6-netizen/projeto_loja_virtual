<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Vista & Arte</title>

    <link rel="stylesheet" href="../css/style_cadastro.css">
</head>
<body>

<header>
    <h1>Vista & Arte</h1>

    <nav>
        <ul>
            <li><a href="../index.html">Início</a></li>
            <li><a href="cadastro.html">Cadastro</a></li>
            <li><a href="sobrenos.html">Sobre Nós</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="carrinho.html">Carrinho</a>
                <img src="/imagens/carrinho.png" alt="Carrinho"></li>
        </ul>
    </nav>
</header>

<main>

    <h2>Cadastro de Cliente</h2>

    <form>

        <div class="grupo">
            <div>
                <label>Nome Completo</label>
                <input type="text" required>
            </div>

            <div>
                <label>CPF</label>
                <input type="text" required>
            </div>
        </div>

        <div class="grupo">
            <div>
                <label>E-mail</label>
                <input type="email" required>
            </div>

            <div>
                <label>Telefone</label>
                <input type="tel">
            </div>
        </div>

        <div class="grupo">
            <div>
                <label>Data de Nascimento</label>
                <input type="date">
            </div>

            <div>
                <label>CEP</label>
                <input type="text">
            </div>
        </div>

        <label>Endereço</label>
        <input type="text">

        <div class="grupo">
            <div>
                <label>Número</label>
                <input type="number">
            </div>

            <div>
                <label>Complemento</label>
                <input type="text">
            </div>
        </div>

        <div class="grupo">
            <div>
                <label>Cidade</label>
                <input type="text">
            </div>

            <div>
                <label>Estado</label>
                <input type="text">
            </div>
        </div>

        <label>Senha</label>
        <input type="password">

        <label>Confirmar Senha</label>
        <input type="password">

        <div class="check">
            <input type="checkbox">
            <span>Aceito os termos de uso.</span>
        </div>

        <button type="submit">Cadastrar</button>

    </form>

</main>

<footer>
    <p>&copy; 2026 Vista & Arte - Todos os direitos reservados.</p>
</footer>

</body>
</html>
